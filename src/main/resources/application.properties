# ?????????????????????????????????????????????
# SERVER
# ?????????????????????????????????????????????
# Spring Boot will start on port 8080
server.port=${PORT:8080}

# ?????????????????????????????????????????????
# POSTGRESQL DATABASE
# ?????????????????????????????????????????????
# The JDBC URL tells Spring where your Postgres DB is
# Format: jdbc:postgresql://HOST:PORT/DATABASE_NAME
spring.datasource.url=${DATABASE_URL}

# Your PostgreSQL username (default is 'postgres')
spring.datasource.username=${DB_USERNAME}

# Your PostgreSQL password ? change this to your actual password
spring.datasource.password=${DB_PASSWORD}

# Which JDBC driver to use
spring.datasource.driver-class-name=org.postgresql.Driver

# ?????????????????????????????????????????????
# JPA / HIBERNATE
# ?????????????????????????????????????????????
# 'validate' means Hibernate checks your @Entity classes match the DB tables
# but does NOT create or change tables. You run schema.sql manually.
# Options: validate | update | create | create-drop
spring.jpa.hibernate.ddl-auto=update

# Prints every SQL query to the console ? useful during development
spring.jpa.show-sql=true

# Makes SQL output readable with indentation
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate we're using PostgreSQL dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ?????????????????????????????????????????????
# EMAIL (SMTP) ? noreply@abhishek.com
# ?????????????????????????????????????????????
# SMTP server host ? use smtp.gmail.com for Gmail
# If you have a custom mail server for abhishek.com, use that host instead
spring.mail.host=smtp.gmail.com

# Gmail SMTP port for TLS
spring.mail.port=${MAIL_PORT:465}

# The Gmail account that will SEND emails
# IMPORTANT: This is the Gmail account you log in with.
# The "From" display will be set to noreply@abhishek.com in code.
spring.mail.username=${MAIL_USERNAME}

# For Gmail: use an App Password (not your real Gmail password)
# Go to: Google Account ? Security ? 2-Step Verification ? App Passwords
spring.mail.password=${MAIL_PASSWORD}

# Enable SMTP authentication
spring.mail.properties.mail.smtp.auth=true

# Enable STARTTLS encryption
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

# The "From" address that appears in the recipient's inbox
# This is what users will see as the sender
app.mail.from=noreply@abhishek.com
app.mail.fromName=Abhishek Team

# ?????????????????????????????????????????????
# SMS PROVIDER ? Fast2SMS (India, free tier)
# ?????????????????????????????????????????????
# Sign up at https://fast2sms.com and get your API key
sms.fast2sms.apiKey=YOUR_FAST2SMS_API_KEY

# Sender ID registered on Fast2SMS (up to 6 chars)
sms.fast2sms.senderId=ABHSHK

# ?????????????????????????????????????????????
# OTP SETTINGS
# ?????????????????????????????????????????????
# OTP expires after this many minutes
app.otp.expiryMinutes=10

# Maximum wrong attempts before OTP is locked
app.otp.maxAttempts=3

# ?????????????????????????????????????????????
# SESSION SETTINGS
# ?????????????????????????????????????????????
# Session token is valid for this many days
app.session.expiryDays=7
